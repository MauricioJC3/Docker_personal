<VirtualHost *:80>
    ServerName proyecto1.test
    DocumentRoot /var/www/html/proyecto1
    <Directory /var/www/html/proyecto1>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>

